<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Art'Fan — Moteur Narratif</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0A0A0C;
  --bg2: #111114;
  --bg3: #18181D;
  --bg4: #202027;
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.11);
  --text: #ECEAE0;
  --text2: #8C8A7E;
  --text3: #4C4A42;
  --gold: #E8C84A;
  --gold2: #C4A832;
  --green: #3DCC8E;
  --red: #E8604A;
  --blue: #4A90E8;
  --purple: #9B6EFA;
  --r: 10px;
  --rlg: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: 'Lora', Georgia, serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* NOISE TEXTURE */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: 0.4;
}

.app { position: relative; z-index: 1; max-width: 860px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

/* HEADER */
.header {
  text-align: center;
  padding: 3rem 0 2.5rem;
  position: relative;
}
.header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 50%; transform: translateX(-50%);
  width: 60px; height: 1px;
  background: var(--gold);
  opacity: 0.4;
}
.logo {
  font-family: 'Syne', sans-serif;
  font-size: 42px;
  font-weight: 800;
  letter-spacing: -2px;
  color: var(--text);
  line-height: 1;
}
.logo em { color: var(--gold); font-style: normal; }
.logo-sub {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--text3);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-top: 8px;
}

/* INPUT ZONE */
.input-zone {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--rlg);
  padding: 1.75rem;
  margin: 2.5rem 0 1.5rem;
  position: relative;
  transition: border-color 0.3s;
}
.input-zone:focus-within { border-color: rgba(232,200,74,0.3); }

.input-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 10px;
  display: block;
}

.main-input {
  width: 100%;
  background: transparent;
  border: none;
  outline: none;
  font-family: 'Lora', serif;
  font-size: 18px;
  color: var(--text);
  line-height: 1.6;
  resize: none;
  min-height: 60px;
}
.main-input::placeholder { color: var(--text3); font-style: italic; }

.input-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 1rem;
  padding-top: 1rem;
  border-top: 1px solid var(--border);
  flex-wrap: wrap;
  gap: 10px;
}

.lang-pills { display: flex; gap: 6px; flex-wrap: wrap; }
.lang-pill {
  padding: 5px 14px;
  border-radius: 99px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  cursor: pointer;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  transition: all 0.18s;
}
.lang-pill:hover { border-color: var(--border2); color: var(--text); }
.lang-pill.on { background: rgba(232,200,74,0.12); color: var(--gold); border-color: rgba(232,200,74,0.3); }

.gen-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 22px;
  background: var(--gold);
  color: #0A0A0C;
  border: none;
  border-radius: 8px;
  font-family: 'Syne', sans-serif;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.02em;
}
.gen-btn:hover { background: var(--gold2); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(232,200,74,0.2); }
.gen-btn:disabled { background: var(--bg4); color: var(--text3); cursor: not-allowed; transform: none; box-shadow: none; }

/* EXAMPLES */
.examples {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 2rem;
}
.ex-chip {
  padding: 6px 14px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 99px;
  font-size: 13px;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.18s;
  font-family: 'Lora', serif;
  font-style: italic;
}
.ex-chip:hover { border-color: var(--border2); color: var(--text); background: var(--bg3); }

/* OUTPUT */
.output { display: none; }
.output.visible { display: block; animation: fadeUp 0.5s ease both; }
@keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:none; } }

/* SECTION */
.section {
  margin-bottom: 1.5rem;
  border: 1px solid var(--border);
  border-radius: var(--rlg);
  overflow: hidden;
  background: var(--bg2);
  animation: fadeUp 0.4s ease both;
}
.section:nth-child(1) { animation-delay: 0.05s; }
.section:nth-child(2) { animation-delay: 0.10s; }
.section:nth-child(3) { animation-delay: 0.15s; }
.section:nth-child(4) { animation-delay: 0.20s; }
.section:nth-child(5) { animation-delay: 0.25s; }
.section:nth-child(6) { animation-delay: 0.30s; }

.section-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 1rem 1.25rem;
  border-bottom: 1px solid var(--border);
  background: var(--bg3);
}
.section-icon {
  width: 32px; height: 32px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}
.section-title {
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--text2);
  flex: 1;
}
.copy-btn {
  padding: 4px 12px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--text3);
  cursor: pointer;
  transition: all 0.18s;
}
.copy-btn:hover { border-color: var(--border2); color: var(--text2); }
.copy-btn.copied { color: var(--green); border-color: rgba(61,204,142,0.3); }

.section-body { padding: 1.25rem 1.5rem; }

/* CHARACTERS */
.chars-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1rem; }
.char-item {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 1rem;
  position: relative;
  overflow: hidden;
}
.char-item::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
}
.char-item:nth-child(1)::before { background: var(--gold); }
.char-item:nth-child(2)::before { background: var(--red); }
.char-item:nth-child(3)::before { background: var(--green); }

.char-name {
  font-family: 'Syne', sans-serif;
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 4px;
}
.char-role {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--text3);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 10px;
}
.char-traits { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
.trait {
  padding: 2px 8px;
  background: var(--bg4);
  border-radius: 99px;
  font-size: 12px;
  color: var(--text2);
  font-family: 'DM Mono', monospace;
}
.char-story { font-size: 13px; color: var(--text2); line-height: 1.6; font-style: italic; }

/* THEMES */
.themes-list { display: flex; flex-direction: column; gap: 10px; }
.theme-item { display: flex; gap: 12px; align-items: flex-start; }
.theme-num {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--gold);
  width: 24px;
  flex-shrink: 0;
  margin-top: 2px;
}
.theme-text { font-size: 14px; color: var(--text); line-height: 1.6; }
.theme-sub { font-size: 13px; color: var(--text2); line-height: 1.5; font-style: italic; margin-top: 2px; }

/* SCENARIO */
.acts { display: flex; flex-direction: column; gap: 1rem; }
.act {
  background: var(--bg3);
  border-radius: var(--r);
  padding: 1rem 1.25rem;
  border-left: 3px solid transparent;
  position: relative;
}
.act.a1 { border-left-color: var(--purple); }
.act.a2 { border-left-color: var(--red); }
.act.a3 { border-left-color: var(--green); }
.act-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.act.a1 .act-label { color: var(--purple); }
.act.a2 .act-label { color: var(--red); }
.act.a3 .act-label { color: var(--green); }
.act-text { font-size: 14px; color: var(--text); line-height: 1.75; }

/* DIALOGUES */
.dialogue-block { margin-bottom: 1.25rem; }
.dialogue-block:last-child { margin-bottom: 0; }
.dialogue-title {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--text3);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}
.line { display: flex; gap: 10px; margin-bottom: 8px; align-items: flex-start; }
.line-name {
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  font-weight: 700;
  min-width: 90px;
  text-align: right;
  padding-top: 2px;
  flex-shrink: 0;
}
.line-name.p1 { color: var(--gold); }
.line-name.p2 { color: var(--blue); }
.line-name.p3 { color: var(--green); }
.line-name.narr { color: var(--text3); font-style: italic; font-weight: 400; font-family: 'Lora', serif; }
.line-text {
  font-size: 14px;
  color: var(--text);
  line-height: 1.65;
  background: var(--bg3);
  border-radius: 0 8px 8px 8px;
  padding: 8px 12px;
  flex: 1;
}
.line-text.narr { background: transparent; color: var(--text2); font-style: italic; padding: 4px 0; border-radius: 0; }

/* TITLES */
.titles-list { display: flex; flex-direction: column; gap: 8px; }
.title-item {
  display: flex;
  gap: 12px;
  align-items: center;
  padding: 10px 14px;
  background: var(--bg3);
  border-radius: 8px;
  border: 1px solid var(--border);
  transition: border-color 0.18s;
}
.title-item:hover { border-color: var(--border2); }
.title-lang {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 0.1em;
  width: 32px;
  flex-shrink: 0;
  text-transform: uppercase;
}
.title-text { font-size: 14px; color: var(--text); flex: 1; }
.title-copy {
  font-size: 16px;
  cursor: pointer;
  opacity: 0.3;
  transition: opacity 0.18s;
  background: none; border: none; color: inherit;
}
.title-copy:hover { opacity: 1; }

/* CALENDAR */
.cal-week { margin-bottom: 1.25rem; }
.cal-week:last-child { margin-bottom: 0; }
.cal-week-title {
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 10px;
}
.cal-day {
  display: flex;
  gap: 12px;
  margin-bottom: 8px;
  align-items: flex-start;
}
.cal-day-num {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--gold);
  width: 52px;
  flex-shrink: 0;
  padding-top: 1px;
}
.cal-day-content { font-size: 13px; color: var(--text2); line-height: 1.6; flex: 1; }
.cal-platforms { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
.cal-plat {
  padding: 2px 8px;
  border-radius: 99px;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  background: var(--bg4);
  color: var(--text3);
}
.cal-plat.yt { background: rgba(232,96,74,0.1); color: var(--red); }
.cal-plat.tt { background: rgba(155,110,250,0.1); color: var(--purple); }
.cal-plat.fb { background: rgba(74,144,232,0.1); color: var(--blue); }
.cal-plat.ig { background: rgba(232,200,74,0.1); color: var(--gold); }

/* LECON */
.lecon-box {
  background: linear-gradient(135deg, rgba(232,200,74,0.06), rgba(61,204,142,0.04));
  border: 1px solid rgba(232,200,74,0.2);
  border-radius: var(--r);
  padding: 1.25rem 1.5rem;
  text-align: center;
}
.lecon-quote {
  font-size: 18px;
  color: var(--text);
  font-style: italic;
  line-height: 1.7;
}
.lecon-quote::before { content: '\201C'; color: var(--gold); font-size: 28px; line-height: 0; vertical-align: -10px; margin-right: 4px; }
.lecon-quote::after { content: '\201D'; color: var(--gold); font-size: 28px; line-height: 0; vertical-align: -10px; margin-left: 4px; }

/* EXPORT BAR */
.export-bar {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 1.5rem;
  padding-top: 1.5rem;
  border-top: 1px solid var(--border);
}
.exp-btn {
  padding: 8px 16px;
  border-radius: 8px;
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--bg2);
  color: var(--text2);
  transition: all 0.18s;
}
.exp-btn:hover { border-color: var(--border2); color: var(--text); }
.exp-btn.primary { background: rgba(232,200,74,0.1); border-color: rgba(232,200,74,0.3); color: var(--gold); }
.exp-btn.primary:hover { background: rgba(232,200,74,0.18); }

/* TOAST */
.toast {
  position: fixed;
  bottom: 24px; right: 24px;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 10px 16px;
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: var(--green);
  display: flex; align-items: center; gap: 8px;
  transform: translateY(60px); opacity: 0;
  transition: all 0.3s ease;
  z-index: 999;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.toast.show { transform: none; opacity: 1; }

/* REGEN */
.regen-bar {
  text-align: center;
  margin-top: 1rem;
}

@media (max-width: 600px) {
  .logo { font-size: 30px; }
  .chars-grid { grid-template-columns: 1fr; }
  .line-name { min-width: 70px; font-size: 11px; }
}
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="logo">Art'<em>Fan</em></div>
    <div class="logo-sub">Moteur narratif éducatif · v2.0</div>
  </div>

  <div class="input-zone">
    <span class="input-label">Votre idée de départ</span>
    <textarea class="main-input" id="idea" rows="2"
      placeholder="Ex: un jeune tenté par l'argent facile, une mère qui sacrifie tout pour ses enfants..."></textarea>
    <div class="input-footer">
      <div class="lang-pills">
        <button class="lang-pill on" onclick="setLang(this,'fr')">FR</button>
        <button class="lang-pill" onclick="setLang(this,'mg')">MG</button>
        <button class="lang-pill" onclick="setLang(this,'en')">EN</button>
        <button class="lang-pill" onclick="setLang(this,'mix')">MIX</button>
      </div>
      <button class="gen-btn" id="gen-btn" onclick="generate()">
        <span>⚡</span> Générer l'histoire
      </button>
    </div>
  </div>

  <div class="examples">
    <span class="input-label" style="width:100%;margin-bottom:4px">Exemples :</span>
    <span class="ex-chip" onclick="useEx(this)">la tentation de l'argent facile</span>
    <span class="ex-chip" onclick="useEx(this)">un jeune qui abandonne ses études</span>
    <span class="ex-chip" onclick="useEx(this)">la pression familiale du mariage</span>
    <span class="ex-chip" onclick="useEx(this)">trahison entre amis d'enfance</span>
    <span class="ex-chip" onclick="useEx(this)">réussir sans perdre ses valeurs</span>
    <span class="ex-chip" onclick="useEx(this)">choisir entre tradition et modernité</span>
  </div>

  <div class="output" id="output"></div>
</div>

<div class="toast" id="toast">✓ <span id="toast-msg">Copié !</span></div>

<script>
let currentLang = 'fr';
let lastIdea = '';
let lastResult = null;

function setLang(el, lang) {
  document.querySelectorAll('.lang-pill').forEach(p => p.classList.remove('on'));
  el.classList.add('on');
  currentLang = lang;
}

function useEx(el) {
  document.getElementById('idea').value = el.textContent;
}

function toast(msg) {
  document.getElementById('toast-msg').textContent = msg;
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ============================================================
// MOTEUR NARRATIF — BASE DE DONNÉES
// ============================================================

const DB = {

  // ARCHÉTYPES DE PERSONNAGES
  archetypes: [
    { role: 'Le Mentor', traits: ['sage','patient','bienveillant'], emoji: '🧓',
      stories: {
        fr: (n,t) => `${n} est un vieux sage du village qui a tout vu. Il connaît les erreurs de jeunesse et leur prix.`,
        mg: (n,t) => `${n} dia lehilahy antitra malala ao amin'ny tanàna. Nahita zavatra maro izy ka mahalala ny lalan'ny fiainana.`,
        en: (n,t) => `${n} is a village elder who has seen it all. He knows the price of youthful mistakes firsthand.`,
        mix: (n,t) => `${n} dia vieux sage ao amin'ny tanàna. Nahita zavatra maro izy — il connaît le prix des erreurs.`
      }
    },
    { role: 'Le Jeune Ambitieux', traits: ['ambitieux','impulsif','courageux'], emoji: '🔥',
      stories: {
        fr: (n,t) => `${n} a grandi dans la pauvreté et rêve de s'en sortir. Mais son impatience le pousse vers des raccourcis dangereux.`,
        mg: (n,t) => `${n} nitombo teo amin'ny fahantrana ka maniry ny hahita ny fahombiazana. Fa ny tsy fahandriany mitarika azy mankany amin'ny lalam-pady.`,
        en: (n,t) => `${n} grew up poor and dreams of making it. But his impatience keeps pushing him toward dangerous shortcuts.`,
        mix: (n,t) => `${n} nitombo teo amin'ny fahantrana — il rêve de s'en sortir. Fa ny tsy fahandriany, ça le pousse vers des raccourcis.`
      }
    },
    { role: "L'Ami Fidèle", traits: ['loyal','honnête','protecteur'], emoji: '🤝',
      stories: {
        fr: (n,t) => `${n} est l'ami de toujours. Il voit tout mais parle rarement. Quand il parle, chaque mot compte.`,
        mg: (n,t) => `${n} no namana hatramin'ny fahazazana. Mahita ny zavatra rehetra izy fa matetika mangina. Rehefa miteny izy, tsara ny mihaino.`,
        en: (n,t) => `${n} is the lifelong friend. He sees everything but rarely speaks. When he does, every word counts.`,
        mix: (n,t) => `${n} no namana hatramin'ny fahazazana. Il voit tout mais mange mangina. Rehefa miteny izy, chaque mot compte.`
      }
    },
    { role: 'La Mère Forte', traits: ['sacrifiée','aimante','déterminée'], emoji: '💪',
      stories: {
        fr: (n,t) => `${n} a tout sacrifié pour ses enfants. Elle porte le poids de la famille sans jamais se plaindre.`,
        mg: (n,t) => `${n} nandoa ny zavatra rehetra ho an'ny zanany. Mitondra ny entam-pianakaviana izy nefa tsy mitaraina.`,
        en: (n,t) => `${n} sacrificed everything for her children. She carries the family's burden without ever complaining.`,
        mix: (n,t) => `${n} nandoa ny zavatra rehetra ho an'ny zanany. Elle porte tout — nefa tsy mitaraina mihitsy.`
      }
    },
    { role: 'Le Tenté', traits: ['vulnérable','tiraillé','sensible'], emoji: '😔',
      stories: {
        fr: (n,t) => `${n} est fondamentalement bon, mais les circonstances le poussent à douter de lui-même et de ses valeurs.`,
        mg: (n,t) => `${n} dia olona tsara fo, fa ny toe-draharaha mampihoron-koditra azy ka manohina ny finoany sy ny soa nampianarina azy.`,
        en: (n,t) => `${n} is fundamentally good, but circumstances push him to doubt himself and his values.`,
        mix: (n,t) => `${n} dia olona tsara fo, mais les circonstances le font douter — manohina ny finoany.`

  titleTemplates: {
    fr: [
      (n,t) => `${n} face à ${t.theme} : jusqu'où iras-tu ?`,
      (n,t) => `Le jour où ${n} a failli tout perdre`,
      (n,t) => `Ce que ${t.theme.toLowerCase()} m'a appris sur moi-même`,
      (n,t) => `${n} : le choix qui change tout`,
      (n,t) => `${t.theme} — histoire d'un homme face à lui-même`
    ],
    mg: [
      (n,t) => `${n} sy ny ${t.theme} : hatraiza no hankanesanao ?`,
      (n,t) => `Ny andro saiky namely an'i ${n}`,
      (n,t) => `Izay nampianarin'ny ${t.theme.toLowerCase()} ahy momba ny tenako`,
      (n,t) => `${n} : ny safidy mampiova ny zavatra rehetra`,
      (n,t) => `${t.theme} — tantaran'ny lehilahy miatrika ny tenany`
    ],
    en: [
      (n,t) => `${n} vs ${t.theme}: How far will you go?`,
      (n,t) => `The day ${n} almost lost everything`,
      (n,t) => `What ${t.theme.toLowerCase()} taught me about myself`,
      (n,t) => `${n}: the choice that changes everything`,
      (n,t) => `${t.theme} — one man's face-off with himself`
    ]
  },

  // CALENDRIER DE PUBLICATION
  calendar: {
    fr: (title) => [
      { week: 'Semaine 1 — Préparation & Teasing', days: [
        { day: 'Jour 1-2', action: `Écriture et mémorisation du scénario complet de "${title}"`, platforms: ['yt'] },
        { day: 'Jour 3', action: 'Tournage des scènes. Lumière naturelle, micro-cravate si possible', platforms: ['yt','fb'] },
        { day: 'Jour 4', action: 'Montage : CapCut ou DaVinci Resolve. Sous-titres obligatoires', platforms: ['yt'] },
        { day: 'Jour 5', action: `Teaser 15 secondes — scène du dilemme uniquement, sans résolution`, platforms: ['tt','ig','fb'] },
        { day: 'Jour 6-7', action: 'Story Instagram + Post Facebook : "Quelque chose arrive... 👀"', platforms: ['ig','fb'] }
      ]},
      { week: 'Semaine 2 — Lancement & Engagement', days: [
        { day: 'Jour 8 🚀', action: `PUBLICATION PRINCIPALE : "${title}" sur YouTube (vidéo longue)`, platforms: ['yt'] },
        { day: 'Jour 8 soir', action: `Version courte 60 sec sur TikTok + Reels Instagram + Facebook`, platforms: ['tt','ig','fb'] },
        { day: 'Jour 9-10', action: 'Répondre à TOUS les commentaires. Épingler le meilleur', platforms: ['yt','fb','tt'] },
        { day: 'Jour 11', action: 'Post de la leçon de vie en image (citation du scénario)', platforms: ['ig','fb'] },
        { day: 'Jour 12-14', action: 'Sondage : quel thème voulez-vous voir en prochain épisode ?', platforms: ['ig','fb','tt'] }
      ]}
    ]
  }
};

// ============================================================
// MOTEUR PRINCIPAL
// ============================================================

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function detectTheme(idea) {
  const lower = idea.toLowerCase();
  for (const [key, val] of Object.entries(DB.themeMap)) {
    if (lower.includes(key)) return val;
  }
  return DB.themeMap.default;
}

function pickName(gender) {
  return pick(gender === 'f' ? DB.names.female : DB.names.male);
}

function buildPersonages(idea) {
  const archetypes = [...DB.archetypes];
  const shuffle = archetypes.sort(() => Math.random() - 0.5);
  const roles = ['main','friend','mentor','villain'];
  const picks = shuffle.slice(0,4);
  const genders = [Math.random()>0.4?'m':'f', Math.random()>0.5?'m':'f', Math.random()>0.7?'m':'f', 'm'];
  const persons = {};
  picks.forEach((a, i) => {
    const g = genders[i];
    const name = pickName(g);
    const lang = currentLang;
    persons[roles[i]] = {
      name, role: a.role, traits: a.traits, emoji: a.emoji,
      story: a.stories[lang] ? a.stories[lang](name, idea) : a.stories.fr(name, idea),
      archetype: a
    };
  });
  return persons;
}

function buildNarrative(persons, theme) {
  const lang = currentLang;
  const nav = DB.narratives[lang] || DB.narratives.fr;
  return {
    act1: pick(nav.act1)(persons, theme),
    act2: pick(nav.act2)(persons, theme),
    act3: pick(nav.act3)(persons, theme)
  };
}

function buildDialogues(persons, theme) {
  const lang = currentLang;
  const dt = DB.dialogueTemplates[lang] || DB.dialogueTemplates.fr;
  return {
    dilemme: pick(dt.dilemme)(persons, theme),
    revelation: pick(dt.revelation)(persons, theme)
  };
}

function buildTitles(persons, theme) {
  const mainName = persons.main.name;
  const langs = ['fr','mg','en'];
  const titles = [];
  langs.forEach(l => {
    const templates = DB.titleTemplates[l];
    const picked = pick(templates)(mainName, theme);
    titles.push({ lang: l.toUpperCase(), text: picked });
  });
  // Add a mix title
  titles.push({ lang: 'MIX', text: `${persons.main.name} : ${theme.theme.toLowerCase()} — tantara iray hampiady anao amin'ny tenanao` });
  return titles;
}

function buildCalendar(title) {
  return DB.calendar.fr(title);
}

// ============================================================
// RENDER
// ============================================================

function generate() {
  const idea = document.getElementById('idea').value.trim();
  if (!idea) { document.getElementById('idea').focus(); return; }

  lastIdea = idea;
  const btn = document.getElementById('gen-btn');
  btn.disabled = true;
  btn.innerHTML = '<span>⏳</span> Génération...';

  setTimeout(() => {
    const theme = detectTheme(idea);
    const persons = buildPersonages(idea);
    const narrative = buildNarrative(persons, theme);
    const dialogues = buildDialogues(persons, theme);
    const titles = buildTitles(persons, theme);
    const calendar = buildCalendar(titles[0].text);

    lastResult = { theme, persons, narrative, dialogues, titles, calendar };
    renderAll(lastResult);

    btn.disabled = false;
    btn.innerHTML = '<span>⚡</span> Régénérer';
  }, 400);
}

function renderAll(r) {
  const out = document.getElementById('output');
  out.innerHTML = '';
  out.className = 'output visible';

  out.appendChild(makeSection('👤', 'rgba(155,110,250,0.15)', 'Personnages', 'chars', renderChars(r.persons)));
  out.appendChild(makeSection('🎯', 'rgba(61,204,142,0.15)', 'Thèmes & Leçon de vie', 'themes', renderThemes(r.theme)));
  out.appendChild(makeSection('📖', 'rgba(232,96,74,0.15)', 'Scénario', 'scenario', renderScenario(r.narrative, r.persons)));
  out.appendChild(makeSection('💬', 'rgba(74,144,232,0.15)', 'Dialogues', 'dialogues', renderDialogues(r.dialogues)));
  out.appendChild(makeSection('📢', 'rgba(232,200,74,0.15)', 'Titres accrocheurs', 'titles', renderTitles(r.titles)));
  out.appendChild(makeSection('📅', 'rgba(61,204,142,0.12)', 'Plan de publication', 'calendar', renderCalendar(r.calendar)));

  // Export bar
  const exp = document.createElement('div');
  exp.className = 'export-bar';
  exp.innerHTML = `
    <button class="exp-btn primary" onclick="exportAll()">📋 Tout copier</button>
    <button class="exp-btn" onclick="generate()">⚡ Régénérer</button>
    <button class="exp-btn" onclick="exportTxt()">💾 Exporter .txt</button>
  `;
  out.appendChild(exp);

  out.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function makeSection(icon, iconBg, title, id, content) {
  const sec = document.createElement('div');
  sec.className = 'section';
  sec.id = 'sec-' + id;
  sec.innerHTML = `
    <div class="section-header">
      <div class="section-icon" style="background:${iconBg}">${icon}</div>
      <div class="section-title">${title}</div>
      <button class="copy-btn" onclick="copySection('${id}')">Copier</button>
    </div>
    <div class="section-body" id="body-${id}"></div>
  `;
  sec.querySelector('#body-' + id).appendChild(content);
  return sec;
}

function renderChars(persons) {
  const div = document.createElement('div');
  div.className = 'chars-grid';
  Object.values(persons).forEach(p => {
    const item = document.createElement('div');
    item.className = 'char-item';
    item.innerHTML = `
      <div class="char-name">${p.emoji} ${p.name}</div>
      <div class="char-role">${p.role}</div>
      <div class="char-traits">${p.traits.map(t=>`<span class="trait">${t}</span>`).join('')}</div>
      <div class="char-story">${p.story}</div>
    `;
    div.appendChild(item);
  });
  return div;
}

function renderThemes(theme) {
  const div = document.createElement('div');
  div.innerHTML = `
    <div class="themes-list">
      <div class="theme-item">
        <div class="theme-num">01</div>
        <div><div class="theme-text"><strong>${theme.theme}</strong></div><div class="theme-sub">Thème central de l'épisode</div></div>
      </div>
      <div class="theme-item">
        <div class="theme-num">02</div>
        <div><div class="theme-text">${theme.lesson}</div><div class="theme-sub">Leçon de vie à transmettre</div></div>
      </div>
    </div>
    <div class="lecon-box" style="margin-top:1rem">
      <div class="lecon-quote">${theme.citation}</div>
    </div>
  `;
  return div;
}

function renderScenario(narrative, persons) {
  const div = document.createElement('div');
  div.innerHTML = `
    <div class="acts">
      <div class="act a1">
        <div class="act-label">Acte 1 — Introduction</div>
        <div class="act-text">${narrative.act1}</div>
      </div>
      <div class="act a2">
        <div class="act-label">Acte 2 — Conflit & Dilemme</div>
        <div class="act-text">${narrative.act2}</div>
      </div>
      <div class="act a3">
        <div class="act-label">Acte 3 — Résolution & Leçon</div>
        <div class="act-text">${narrative.act3}</div>
      </div>
    </div>
  `;
  return div;
}

function renderDialogues(dialogues) {
  const div = document.createElement('div');

  const makeDialogue = (title, lines) => {
    let html = `<div class="dialogue-block"><div class="dialogue-title">${title}</div>`;
    lines.forEach(l => {
      html += `<div class="line">
        <div class="line-name ${l.cls}">${l.speaker}</div>
        <div class="line-text ${l.cls === 'narr' ? 'narr' : ''}">${l.text}</div>
      </div>`;
    });
    html += '</div>';
    return html;
  };

  div.innerHTML =
    makeDialogue('Dialogue 1 — La scène du dilemme', dialogues.dilemme) +
    makeDialogue('Dialogue 2 — La révélation', dialogues.revelation);
  return div;
}

function renderTitles(titles) {
  const div = document.createElement('div');
  div.className = 'titles-list';
  titles.forEach(t => {
    const item = document.createElement('div');
    item.className = 'title-item';
    item.innerHTML = `
      <div class="title-lang">${t.lang}</div>
      <div class="title-text">${t.text}</div>
      <button class="title-copy" onclick="copySingle('${t.text.replace(/'/g,"\\'")}')">📋</button>
    `;
    div.appendChild(item);
  });
  return div;
}

function renderCalendar(calendar) {
  const div = document.createElement('div');
  const platMap = { yt:'YT', tt:'TT', fb:'FB', ig:'IG' };
  calendar.forEach(week => {
    let html = `<div class="cal-week"><div class="cal-week-title">${week.week}</div>`;
    week.days.forEach(d => {
      html += `<div class="cal-day">
        <div class="cal-day-num">${d.day}</div>
        <div class="cal-day-content">
          ${d.action}
          <div class="cal-platforms">${d.platforms.map(p=>`<span class="cal-plat ${p}">${platMap[p]}</span>`).join('')}</div>
        </div>
      </div>`;
    });
    html += '</div>';
    div.innerHTML += html;
  });
  return div;
}

// ============================================================
// COPY & EXPORT
// ============================================================

function copySection(id) {
  const el = document.getElementById('body-' + id);
  if (!el) return;
  navigator.clipboard.writeText(el.innerText);
  const btn = document.querySelector(`#sec-${id} .copy-btn`);
  if (btn) { btn.textContent = '✓ Copié'; btn.className = 'copy-btn copied'; setTimeout(() => { btn.textContent = 'Copier'; btn.className = 'copy-btn'; }, 2000); }
  toast('Section copiée ✓');
}

function copySingle(text) {
  navigator.clipboard.writeText(text);
  toast('Titre copié ✓');
}

function exportAll() {
  if (!lastResult) return;
  const r = lastResult;
  let text = `ART'FAN STUDIO — GÉNÉRATION NARRATIVE\n${'='.repeat(40)}\n\n`;
  text += `THÈME: ${r.theme.theme}\nLEÇON: ${r.theme.lesson}\nCITATION: ${r.theme.citation}\n\n`;
  text += `PERSONNAGES:\n`;
  Object.values(r.persons).forEach(p => { text += `• ${p.name} (${p.role}) — ${p.traits.join(', ')}\n  ${p.story}\n`; });
  text += `\nSCÉNARIO:\nACTE 1: ${r.narrative.act1}\nACTE 2: ${r.narrative.act2}\nACTE 3: ${r.narrative.act3}\n\n`;
  text += `DIALOGUES:\n`;
  [...r.dialogues.dilemme, ...r.dialogues.revelation].forEach(l => { text += `${l.speaker}: ${l.text}\n`; });
  text += `\nTITRES:\n`;
  r.titles.forEach(t => { text += `[${t.lang}] ${t.text}\n`; });
  navigator.clipboard.writeText(text);
  toast('Tout copié dans le presse-papier ✓');
}

function exportTxt() {
  if (!lastResult) return;
  const r = lastResult;
  let text = `ART'FAN STUDIO — ${r.titles[0]?.text || 'HISTOIRE'}\n${'='.repeat(50)}\n\n`;
  text += `THÈME: ${r.theme.theme}\nLEÇON: ${r.theme.lesson}\n\n`;
  text += `--- PERSONNAGES ---\n`;
  Object.values(r.persons).forEach(p => { text += `${p.name} (${p.role})\nTraits: ${p.traits.join(', ')}\n${p.story}\n\n`; });
  text += `--- SCÉNARIO ---\nACTE 1 — INTRODUCTION\n${r.narrative.act1}\n\nACTE 2 — CONFLIT\n${r.narrative.act2}\n\nACTE 3 — RÉSOLUTION\n${r.narrative.act3}\n\n`;
  text += `--- DIALOGUES ---\n`;
  text += `SCÈNE DU DILEMME:\n`;
  r.dialogues.dilemme.forEach(l => { text += `${l.speaker}: ${l.text}\n`; });
  text += `\nSCÈNE DE LA RÉVÉLATION:\n`;
  r.dialogues.revelation.forEach(l => { text += `${l.speaker}: ${l.text}\n`; });
  text += `\n--- TITRES ---\n`;
  r.titles.forEach(t => { text += `[${t.lang}] ${t.text}\n`; });

  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'artfan-histoire.txt';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  toast('Fichier téléchargé ✓');
}

function toast(msg) {
  document.getElementById('toast-msg').textContent = msg;
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ENTER key
document.getElementById('idea').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); generate(); }
});
